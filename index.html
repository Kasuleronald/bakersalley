<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>BakersAlley 3.1 - Industrial ERP</title>
    
    <!-- PWA & Mobile Optimization -->
    <meta name="theme-color" content="#3d2b1f" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BakersAlley" />
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3014/3014510.png" />
    <link rel="manifest" href="/bakersalley/manifest.json" />
    
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap');
      
      body {
        background-color: #faf9f6;
        color: #2c1f1a;
        -webkit-font-smoothing: antialiased;
        overscroll-behavior-y: contain;
      }
      .animate-softFade {
        animation: softFadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      @keyframes softFadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .glass {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }
      .harvest-gradient {
        background: linear-gradient(135deg, #713f12 0%, #422006 100%);
      }
      .image-card-overlay {
        background: linear-gradient(to top, rgba(44, 31, 26, 0.9) 0%, rgba(44, 31, 26, 0) 60%);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
